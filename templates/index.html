    onclick="if(event.target===this)closeLabelModal()">
    <div class="lm-modal">
      <div class="lm-modal-head">
        <div>
          <div class="lm-modal-dept">LABEL</div>
          <div class="lm-modal-title" id="lm-title">Result</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <span class="lm-modal-ts" id="lm-ts"></span>
          <button class="lm-modal-close" onclick="closeLabelModal()">✕</button>
        </div>
      </div>
      <div class="lm-modal-body" id="lm-body"></div>
      <div class="lm-modal-foot">
        <button class="t-btn" id="lm-json-btn" onclick="toggleLabelJson()">Show JSON</button>
        <button class="t-btn" onclick="copyLabelJson()">Copy JSON</button>
        <button class="t-btn" onclick="closeLabelModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="sb-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;"
    onclick="toggleSidebar()"></div>

  <script>
    /* ══════════════════════════════════════════════════════════════════
       STATE & CONSTANTS
    ══════════════════════════════════════════════════════════════════ */
    const STATE = { slug: null, tab: "overview", data: null, es: null, chart: null };
    /**
     * Safely performs any API action that requires a selected artist slug.
     * Usage: pass your async function as the second argument. The slug is passed in!
     * Shows a toast if slug missing or bad.
     *
     * @param {Function} action - a function(slug) => Promise
     */
    function withValidSlug(action) {
      const slug = STATE.slug;
      if (!slug || slug === "undefined") {
        toast("Please select an artist before continuing.", "err");
        return;
      }
      // Pass the slug to the provided action
      return action(slug);
    }
    const AGENT_META = [
      { id: "vinyl", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="2.5"/><circle cx="10" cy="10" r="1" fill="currentColor" stroke="none"/></svg>', lbl: "VINYL", desc: "Streaming" },
      { id: "echo", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5v1a1 1 0 0 0 1 1h1l4 3.5V6L5 9.5H4a1 1 0 0 0-1 1z"/><path d="M13 9a3 3 0 0 1 0 2"/><path d="M15.5 7a6 6 0 0 1 0 6"/></svg>', lbl: "ECHO", desc: "Social" },
      { id: "atlas", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M3 10h14"/><path d="M10 3c-2.5 3-2.5 11 0 14M10 3c2.5 3 2.5 11 0 14"/></svg>', lbl: "ATLAS", desc: "Press" },
      { id: "forge", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3c1 2 3.5 3.5 3.5 6.5 0 2-1.5 3.5-3.5 4.5-2-1-3.5-2.5-3.5-4.5C6.5 6.5 9 5 10 3z"/><path d="M8 16h4M10 14v2"/></svg>', lbl: "FORGE", desc: "Releases" },
      { id: "sage", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 11c0-2.2 1.8-4 4-4s4 1.8 4 4c0 1.6-.8 3-2 3.7V17H8v-2.3C6.8 14 6 12.6 6 11z"/><line x1="10" y1="7" x2="10" y2="4"/></svg>', lbl: "SAGE", desc: "Strategy" },
      { id: "bridge", icon: '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 15c0-4.4 3.1-8 7-8s7 3.6 7 8"/><line x1="3" y1="15" x2="17" y2="15"/><line x1="7" y1="15" x2="7" y2="18"/><line x1="13" y1="15" x2="13" y2="18"/></svg>', lbl: "BRIDGE", desc: "Health" },
    ];

    const API_PREFIX = "{{ api_prefix }}";

    /* ══════════════════════════════════════════════════════════════════
       UTILITIES
    ══════════════════════════════════════════════════════════════════ */
    const apiFetch = (url, opts = {}) =>
      fetch(url, { credentials: "include", ...opts }).then(r => r.json());

    function initials(n = "") {
      return n.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase() || "?";
    }

    function trendIcon(t = "") {
      const s = String(t).toLowerCase();
      if (s.includes("up") || s.includes("improv")) return "▲";
      if (s.includes("down") || s.includes("declin")) return "▼";
      return "→";
    }

    function scoreColor(score) {
      if (score == null) return "no-data";
      if (score >= 70) return "good";
      if (score >= 40) return "monitor";
      return "critical";
    }

    function statusLabel(s) {
      return { good: "Good", monitor: "Monitor", critical: "Critical", "no-data": "No Data" }[s] || "—";
    }

    function fmtScore(score) { return score != null ? score : "—"; }

    function toast(msg, type = "inf", ms = 3500) {
      const c = document.getElementById("toast-container");
      const el = document.createElement("div");
      el.className = "toast " + type;
      const icon = { ok: "✓", err: "✗", inf: "ℹ" }[type] || "ℹ";
      el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
      c.appendChild(el);
      setTimeout(() => el.remove(), ms);
    }

    function stopStream() {
      if (STATE.es) { STATE.es.close(); STATE.es = null; }
    }

    /* ══════════════════════════════════════════════════════════════════
       INIT
    ══════════════════════════════════════════════════════════════════ */
    document.addEventListener("DOMContentLoaded", () => {
      updateClock();
      setInterval(updateClock, 1000);
      loadSidebar();
      loadDashboard();
    });

    function updateClock() {
      document.getElementById("clock").textContent =
        new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function refresh() { STATE.slug ? loadArtist(STATE.slug) : loadDashboard(); }

    function toggleSidebar() {
      const sb = document.getElementById("sidebar");
      const ov = document.getElementById("sb-overlay");
      const open = sb.classList.toggle("open");
      ov.style.display = open ? "block" : "none";
    }

    /* ══════════════════════════════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════════════════════════════ */
    async function loadSidebar() {
      const rows = await apiFetch(API_PREFIX + "/api/dashboard").catch(() => []);
      const el = document.getElementById("sb-artists");
      if (!rows.length) {
        el.innerHTML = `<div style="padding:12px 16px;color:var(--muted);font-size:.75rem;">No artists found</div>`;
        return;
      }
      el.innerHTML = rows.map(r => `
    <button class="artist-item" id="sb-${r.slug}" onclick="showArtist('${r.slug}')">
      <div class="sb-avatar">${initials(r.name)}</div>
      <span class="sb-name">${r.name}</span>
      <span class="sb-dot ${r.status}"></span>
    </button>`).join("");
    }

    function highlightSidebar(slug) {
      document.querySelectorAll(".artist-item").forEach(b => b.classList.remove("active"));
      const el = document.getElementById("sb-" + slug);
      if (el) el.classList.add("active");
    }

    /* ══════════════════════════════════════════════════════════════════
       DASHBOARD VIEW
    ══════════════════════════════════════════════════════════════════ */
    function showDashboard() {
      STATE.slug = null;
      stopStream();
      document.getElementById("nav-dash").classList.add("active");
      document.querySelectorAll(".artist-item").forEach(b => b.classList.remove("active"));
      document.getElementById("topbar-title").textContent = "Dashboard";
      document.getElementById("view-dashboard").classList.add("active");
      document.getElementById("view-artist").classList.remove("active");
      loadDashboard();
    }

 async function loadDashboard() {
      loadSageBrief();
      const content = document.getElementById("dashboard-roster");  inner.innerHTML = `<div class="spinner"></div>`;

      const rows = await apiFetch(API_PREFIX + "/api/dashboard").catch(() => null);
      if (!rows) {
        inner.innerHTML = `<div style="color:var(--red);padding:24px;">Failed to load dashboard.</div>`;
        return;
      }

      const total = rows.length;
      const good = rows.filter(r => r.status === "good").length;
      const monitor = rows.filter(r => r.status === "monitor").length;
      const critical = rows.filter(r => r.status === "critical").length;

      // Build cards HTML separately to avoid deep nesting issues
      const cards = rows.map(r => {
        const ti = trendIcon(r.trend);
        const tEmoji = ti === "▲" ? "🟢" : ti === "▼" ? "🔴" : "⚪";
        return `
      <div class="artist-card status-${r.status}" onclick="showArtist('${r.slug}')">
        <div class="card-top">
          <div class="card-av">${initials(r.name)}</div>
          <span class="card-badge ${r.status}">${statusLabel(r.status)}</span>
        </div>
        <div class="card-name">${r.name}</div>
        <div class="card-genre">${r.genre}</div>
        <div class="card-score-row">
          <span class="score-big ${r.status}">${fmtScore(r.score)}</span>
          <span class="score-denom">${r.score != null ? "/100" : ""}</span>
          <span class="trend-pill">${r.score != null ? tEmoji : ""}</span>
        </div>
        <div class="card-foot">
          <div class="card-meta">🎵 ${r.genre}</div>
          <div class="card-meta">📀 ${r.release}</div>
          <div class="card-meta">🕒 ${r.last_run}</div>
        </div>
      </div>`;
      }).join("");

      inner.innerHTML = `
<div class="dash-heading">
          <div class="dash-title">Roster Health Dashboard</div>
          <div class="dash-sub">Real-time intelligence across all label artists</div>
        </div>

        <!-- SAGE Daily Brief Section -->
        <div id="sage-brief-container" style="margin-bottom: 24px; display: none;">
          <div style="background: rgba(0, 200, 212, 0.05); border: 1px solid var(--cyan-dim); border-radius: 10px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">🧠</span>
                <h3 style="color: var(--cyan); margin: 0; font-size: 1rem; letter-spacing: 0.05em;">SAGE DAILY BRIEF</h3>
              </div>
              <div id="sage-date" style="font-family: var(--mono); font-size: 0.7rem; color: var(--muted);"></div>
            </div>
            <div id="sage-headline" style="font-size: 1.1rem; font-weight: 600; color: var(--white); margin-bottom: 15px;"></div>
            <div id="sage-actions" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
          </div>
        </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val cyan">${total}</div><div class="stat-lbl">Artists</div></div>
      <div class="stat-card"><div class="stat-val green">${good}</div><div class="stat-lbl">Healthy</div></div>
      <div class="stat-card"><div class="stat-val yellow">${monitor}</div><div class="stat-lbl">Monitor</div></div>
      <div class="stat-card"><div class="stat-val red">${critical}</div><div class="stat-lbl">Critical</div></div>
    </div>
    <div class="cards-grid">${cards}</div>`;
    }

    /* ══════════════════════════════════════════════════════════════════
       ARTIST VIEW
    ══════════════════════════════════════════════════════════════════ */
    function showArtist(slug) {
      STATE.slug = slug;
      STATE.tab = "overview";
      stopStream();
      document.getElementById("nav-dash").classList.remove("active");
      highlightSidebar(slug);
      document.getElementById("view-dashboard").classList.remove("active");
      document.getElementById("view-artist").classList.add("active");
      document.getElementById("artist-hero").innerHTML = `<div class="spinner"></div>`;
      document.getElementById("tabs-bar").style.display = "none";

      ["overview", "agents", "history", "outputs", "checkin"].forEach(t => {
        const p = document.getElementById("tab-" + t);
        p.innerHTML = "";
        p.classList.toggle("active", t === "overview");
      });
      document.querySelectorAll(".tab-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.tab === "overview")
      );

      loadArtist(slug);
    }

    async function loadArtist(slug) {
      const data = await apiFetch(API_PREFIX + "/api/artist/" + slug).catch(() => null);
      if (!data || data.error) { toast("Failed to load artist", "err"); return; }
      STATE.data = data;
      document.getElementById("topbar-title").textContent =
        data.profile?.artist_info?.name || slug;
      renderHero(data);
      document.getElementById("tabs-bar").style.display = "flex";
      // Re-render active tab with fresh data
      const panel = document.getElementById("tab-" + STATE.tab);
      panel.innerHTML = "";
      renderTab(STATE.tab, data);
    }

    function renderHero(d) {
      const name = d.profile?.artist_info?.name || d.slug;
      const genre = d.profile?.musical_identity?.primary_genre || "—";
      const label = d.profile?.artist_info?.label || "—";
      const sc = d.score;
      const status = d.status;

      document.getElementById("artist-hero").innerHTML = `
    <div class="hero-av">${initials(name)}</div>
    <div class="hero-info">
      <div class="hero-name">${name}</div>
      <div class="hero-meta">${genre} &nbsp;·&nbsp; ${label}</div>
    </div>
    <div class="hero-score-blk">
      <div class="hero-score ${status}">${fmtScore(sc)}</div>
      <div class="hero-score-lbl">${sc != null ? "/ 100 &nbsp; " + statusLabel(status) : "No Score Yet"}</div>
    </div>`;
    }

    /* ══════════════════════════════════════════════════════════════════
       TABS
    ══════════════════════════════════════════════════════════════════ */
    function switchTab(tab) {
      STATE.tab = tab;
      document.querySelectorAll(".tab-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.tab === tab)
      );
      document.querySelectorAll(".tab-panel").forEach(p =>
        p.classList.toggle("active", p.id === "tab-" + tab)
      );
      const panel = document.getElementById("tab-" + tab);
      if (!panel.innerHTML.trim()) renderTab(tab, STATE.data);
    }

    function renderTab(tab, d) {
      if (!d) return;
      const fns = {
        overview: renderOverview,
        agents: renderAgents,
        history: renderHistory,
        outputs: renderOutputs,
        checkin: renderCheckin,
      };
      if (fns[tab]) fns[tab](d);
    }

    /* ══════════════════════════════════════════════════════════════════
       TAB: OVERVIEW
    ══════════════════════════════════════════════════════════════════ */
    function renderOverview(d) {
      const ai = d.profile?.artist_info || {};
      const mi = d.profile?.musical_identity || {};
      const ur = d.profile?.upcoming_release || {};
      const mgmt = d.profile?.management || {};
      const bridge = d.outputs?.bridge;
      const health = bridge?.health_assessment || bridge?.health || {};

      const infoRows = [
        ["Artist", ai.name || "—"],
        ["Label", ai.label || "—"],
        ["Genre", mi.primary_genre || "—"],
        ["Subgenres", (mi.subgenres || []).join(", ") || "—"],
        ["Home City", ai.home_city || "—"],
        ["Manager", mgmt.name || "—"],
        ["Email", ai.email || "—"],
        ["Instagram", ai.instagram || "—"],
        ["Upcoming Release", ur.title || "—"],
        ["Release Date", ur.release_date || "—"],
      ];

      const bridgeRows = bridge ? [
        ["Overall Score", health.overall_score ?? health.score ?? "—"],
        ["Trend", health.trend || "—"],
        ["Streaming", health.streaming || "—"],
        ["Social", health.social || "—"],
        ["Press", health.press || "—"],
        ["Recommendation", health.recommendation || "—"],
      ] : null;

      const infoHTML = infoRows.map(([k, v]) => `
    <div class="info-row">
      <span class="info-key">${k}</span>
      <span class="info-val">${v}</span>
    </div>`).join("");

      const bridgeHTML = bridgeRows
        ? bridgeRows.map(([k, v]) => `
        <div class="info-row">
          <span class="info-key">${k}</span>
          <span class="info-val">${v}</span>
        </div>`).join("")
        : `<div class="no-data"><span class="no-data-icon">🌉</span>BRIDGE not yet run for this artist.</div>`;

      document.getElementById("tab-overview").innerHTML = `
    <div class="two-col">
      <div class="card-block">
        <div class="block-title">Artist Profile</div>
        ${infoHTML}
      </div>
      <div class="card-block">
        <div class="block-title">Latest BRIDGE Assessment</div>
        ${bridgeHTML}
      </div>
    </div>`;
    }

    /* ══════════════════════════════════════════════════════════════════
       TAB: RUN AGENTS
    ══════════════════════════════════════════════════════════════════ */
    function renderAgents(d) {
      const name = d.profile?.artist_info?.name || d.slug;

      const agentBtns = AGENT_META.map(a => `
    <button class="agent-btn" id="btn-${a.id}" onclick="runAgent('${a.id}')">
      <span class="agent-icon">${a.icon}</span>
      <span class="agent-lbl">${a.lbl}</span>
      <span class="agent-desc">${a.desc}</span>
    </button>`).join("");

      document.getElementById("tab-agents").innerHTML = `
    <button class="pipeline-btn" id="btn-full" onclick="runAgent('full')">
      ▶▶ &nbsp; RUN FULL PIPELINE — ALL AGENTS — ${name.toUpperCase()}
    </button>
    <div class="agent-grid">${agentBtns}</div>
    <div class="terminal-wrap">
      <div class="terminal-bar">
        <div class="t-dots">
          <div class="t-dot r"></div>
          <div class="t-dot y"></div>
          <div class="t-dot g"></div>
        </div>
        <span class="t-label" id="t-label">— ready —</span>
        <div class="t-actions">
          <button class="t-btn" onclick="clearTerminal()">Clear</button>
        </div>
      </div>
      <div class="terminal-out" id="terminal">
        <span class="t-dim">▸ Select an agent or click RUN FULL PIPELINE to begin</span>
      </div>
    </div>`;
    }

    function runAgent(agentId) {
      stopStream();
      STATE.agentRunning = agentId;
      const slug = STATE.slug;
      const name = STATE.data?.profile?.artist_info?.name || slug;
      const fullBtn = document.getElementById("btn-full");
      const label = document.getElementById("t-label");
      const term = document.getElementById("terminal");

      // Reset button states
      AGENT_META.forEach(a => {
        const b = document.getElementById("btn-" + a.id);
        if (b) b.className = "agent-btn";
      });

      if (agentId === "full") {
        if (fullBtn) {
          fullBtn.disabled = false;
          fullBtn.textContent = "▶▶  RUN FULL PIPELINE — ALL AGENTS — " + name.toUpperCase();
        }
        if (label) label.textContent = "— ready —";
      }

      // Blinking cursor
      const cursor = document.createElement("span");
      cursor.className = "t-cursor";
      term.appendChild(cursor);

      const addLine = (txt, cls = "") => {
        const line = document.createElement("div");
        if (cls) line.className = cls;
        line.textContent = txt;
        term.insertBefore(line, cursor);
        term.scrollTop = term.scrollHeight;
      };

      // Classify line for colour
      const lineClass = txt => {
        const t = txt.toLowerCase();
        if (txt.startsWith("▶") || txt.startsWith("─")) return "t-cyan";
        if (txt.startsWith("✓") || t.includes("success")) return "t-green";
        if (txt.startsWith("✗") || t.includes("error") || t.includes("failed")) return "t-red";
        if (txt.startsWith("#") || t.startsWith("//")) return "t-dim";
        return "";
      };
      // ... helpers above ...

      // Reset success flag for this run
      STATE.gotResult = false;

      // If an older stream is still open, close it
      if (STATE.es) { STATE.es.close(); STATE.es = null; }

      STATE.es = new EventSource(API_PREFIX + "/api/stream/" + agentId + "/" + slug);

      STATE.es.onmessage = (e) => {
        let msg = {};
        console.log("Stream event:", e.data);

        try {
          msg = JSON.parse(e.data);
        } catch (err) {
          return;
        }

        // progress lines
        if (msg.line) addLine(msg.line, lineClass(msg.line));

        // success
        if (msg.result) {
          STATE.gotResult = true;
          renderAgentResults(msg.result);
        }

        // error payload
        if (msg.error) {
          addLine("ERROR: " + msg.error, "t-red");
          if (msg.output) addLine(String(msg.output));
        }

        // done
        if (msg.done) {
          if (STATE.es) { STATE.es.close(); STATE.es = null; }
          if (cursor?.parentNode) cursor.remove();
          if (label) label.textContent = "✓ Complete";
        }
      };

      STATE.es.onerror = () => {
        if (STATE.gotResult) {
          console.log("Stream closed after result (quiet close).");
          if (cursor?.parentNode) cursor.remove();
          if (STATE.es) { STATE.es.close(); STATE.es = null; }
          if (label) label.textContent = "✓ Complete";
          return;
        }

        addLine("Connection error — check server logs", "t-red");
        console.log("Stream disconnected/error event fired.");
        if (cursor?.parentNode) cursor.remove();
        if (STATE.es) { STATE.es.close(); STATE.es = null; }
        if (label) label.textContent = "✗ Connection lost";
        toast("Stream disconnected", "err");
      };

      function clearTerminal() {
        const term = document.getElementById("terminal");
        if (term) term.innerHTML = `<span class="t-dim">▸ Terminal cleared</span>`;
      }
    }

      /* ══════════════════════════════════════════════════════════════════
         TAB: HISTORY
      ══════════════════════════════════════════════════════════════════ */
      function renderHistory(d) {
        const hist = d.history || [];
        const panel = document.getElementById("tab-history");

        if (!hist.length) {
          panel.innerHTML = `<div class="no-data">
      <span class="no-data-icon">📊</span>
      No BRIDGE history yet. Run BRIDGE to start tracking health over time.
    </div>`;
          return;
        }

        const tableRows = [...hist].reverse().map((h, i) => {
          const st = scoreColor(h.score);
          const col = st === "good" ? "var(--green)" : st === "monitor" ? "var(--yellow)" : "var(--red)";
          return `<tr>
      <td class="t-dim">${i + 1}</td>
      <td>${h.timestamp}</td>
      <td style="color:${col};font-family:var(--mono);font-weight:700;">${h.score}</td>
      <td><span class="card-badge ${st}">${statusLabel(st)}</span></td>
    </tr>`;
        }).join("");

        panel.innerHTML = `
    <div class="chart-wrap">
      <div class="chart-title">Health Score Over Time (BRIDGE History)</div>
      <div class="chart-box"><canvas id="health-chart"></canvas></div>
    </div>
    <div class="card-block">
      <div class="block-title">Score Log</div>
      <table class="hist-table">
        <thead>
          <tr><th>#</th><th>Date / Time</th><th>Score</th><th>Status</th></tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;

        // Destroy old chart before creating a new one
        if (STATE.chart) { STATE.chart.destroy(); STATE.chart = null; }

        const labels = hist.map(h => h.timestamp);
        const scores = hist.map(h => h.score);
        const ptColors = scores.map(s =>
          s >= 70 ? "rgba(0,201,122,0.9)" : s >= 40 ? "rgba(245,200,66,0.9)" : "rgba(232,69,69,0.9)"
        );

        const ctx = document.getElementById("health-chart").getContext("2d");
        STATE.chart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Health Score",
              data: scores,
              borderColor: "rgba(0,200,212,0.6)",
              backgroundColor: "rgba(0,200,212,0.05)",
              pointBackgroundColor: ptColors,
              pointBorderColor: ptColors,
              pointRadius: 5,
              pointHoverRadius: 7,
              tension: 0.35,
              fill: true,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                min: 0, max: 100,
                grid: { color: "rgba(42,42,42,0.8)" },
                ticks: { color: "#555", font: { family: "Courier New" } },
              },
              x: {
                grid: { color: "rgba(42,42,42,0.4)" },
                ticks: { color: "#555", font: { family: "Courier New", size: 10 }, maxRotation: 45 },
              }
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => ` Score: ${ctx.raw}/100 — ${statusLabel(scoreColor(ctx.raw))}`
                }
              }
            }
          }
        });
      }

      /* ══════════════════════════════════════════════════════════════════
         TAB: OUTPUTS
      ══════════════════════════════════════════════════════════════════ */
      function renderOutputs(d) {
        const outputs = d.outputs || {};
        const panel = document.getElementById("tab-outputs");
        const agents = AGENT_META.filter(a => outputs[a.id]);

        if (!agents.length) {
          panel.innerHTML = `<div class="no-data">
      <span class="no-data-icon">📄</span>
      No agent outputs found yet. Run some agents first.
    </div>`;
          return;
        }

        const items = agents.map(a => `
    <div>
      <button class="acc-toggle" onclick="toggleAcc('acc-${a.id}', this)">
        <span>${a.icon} &nbsp; ${a.lbl}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="acc-tag">Latest Output</span>
          <span class="acc-chevron">▼</span>
        </div>
      </button>
      <div class="acc-body" id="acc-${a.id}">${JSON.stringify(outputs[a.id], null, 2)}</div>
    </div>`).join("");

        panel.innerHTML = `<div class="accordion">${items}</div>`;
      }

      function toggleAcc(id, btn) {
        const body = document.getElementById(id);
        const open = body.classList.toggle("open");
        btn.classList.toggle("open", open);
      }

      /* ══════════════════════════════════════════════════════════════════
         TAB: CHECK-IN
      ══════════════════════════════════════════════════════════════════ */
      function renderCheckin(d) {
        const name = d.profile?.artist_info?.name || d.slug;
        const slug = d.slug;
        const payload = {
          artist: name,
          slug,
          score: d.score,
          status: d.status,
          trend: d.trend,
          timestamp: new Date().toISOString(),
          source: "maestro-web-ui",
        };

        document.getElementById("tab-checkin").innerHTML = `
    <div class="checkin-grid">

      <div class="card-block">
        <div class="block-title">Log Check-in — ${name}</div>
        <div class="field-label" style="margin-top:10px;">Notes (optional)</div>
        <textarea id="checkin-note"
          placeholder="Call notes, meeting summary, follow-up actions..."></textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="doCheckin('${slug}')">
            📋 &nbsp;Log Check-in
          </button>
        </div>
        <div class="result-box" id="checkin-result"></div>
      </div>

      <div class="card-block">
        <div class="block-title">Fire Webhook — Health Update</div>
        <p style="font-size:.76rem;color:var(--muted);margin-bottom:12px;line-height:1.7;">
          Sends current health data to your configured webhook endpoint
          (n8n, Zapier, Make, etc.)
        </p>
        <div class="field-label">Payload Preview</div>
        <div class="webhook-preview">${JSON.stringify(payload, null, 2)}</div>
        <div class="btn-row">
          <button class="btn-secondary" onclick="doWebhook('${slug}')">
            🔗 &nbsp;Fire Webhook
          </button>
        </div>
        <div class="result-box" id="webhook-result"></div>
      </div>

    </div>`;
      }

      async function doCheckin(slug) {
        const note = document.getElementById("checkin-note")?.value.trim() || "";
        const res = document.getElementById("checkin-result");
        res.style.display = "none";

        if (!slug || slug === "undefined") {
          alert("Please select an artist before continuing.");
          return;
        }
        const result = await apiFetch(API_PREFIX + "/api/checkin/" + slug, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ note }),
        }).catch(e => ({ success: false, error: String(e) }));

        res.className = "result-box " + (result.success ? "ok" : "err");
        res.textContent = result.success
          ? "✓ Check-in logged\n\n" + (result.output || "")
          : "✗ " + (result.error || "Failed");
        res.style.display = "block";
        toast(result.success ? "Check-in logged" : "Check-in failed", result.success ? "ok" : "err");
      }

      async function doWebhook(slug) {
        const res = document.getElementById("webhook-result");
        res.style.display = "none";
        if (!slug || slug === "undefined") {
          alert("Please select an artist before continuing.");
          return;
        }
        const result = await apiFetch(API_PREFIX + "/api/webhook/" + slug, { method: "POST" })
          .catch(e => ({ sent: false, error: String(e) }));

        res.className = "result-box " + (result.sent ? "ok" : "err");
        res.textContent = result.sent
          ? "✓ Webhook fired — HTTP " + result.http_status
          : "✗ " + (result.error || "Failed");
        res.style.display = "block";
        toast(result.sent ? "Webhook sent" : "Webhook failed", result.sent ? "ok" : "err");
      }
      function renderAgentResults(result) {
        // Show structured modal
        const agentId = STATE.agentRunning || (typeof result === 'object' && result.agent) || 'agent';
        renderLabelResultModal(agentId, result);
        // Keep a brief terminal status line
        const term = document.getElementById("terminal");
        if (term) {
          const line = document.createElement("div");
          line.className = "t-green";
          line.textContent = "✓ Done — results shown below";
          const cursor = term.querySelector(".t-cursor");
          if (cursor) term.insertBefore(line, cursor); else term.appendChild(line);
          term.scrollTop = term.scrollHeight;
        }
      }

      /* ── Label result modal ────────────────────────────────────────────── */
      let lmData = null;
      let lmJsonVisible = false;
      const EXCLUDED_NOTE_VALUES = ["none", "n/a", ""];

      function closeLabelModal() {
        document.getElementById("label-result-modal").style.display = "none";
      }

      function toggleLabelJson() {
        lmJsonVisible = !lmJsonVisible;
        const btn = document.getElementById("lm-json-btn");
        const cards = document.getElementById("lm-body").querySelector(".lm-cards");
        const jsonEl = document.getElementById("lm-json-view");
        if (cards) cards.style.display = lmJsonVisible ? "none" : "";
        if (jsonEl) jsonEl.style.display = lmJsonVisible ? "block" : "none";
        if (btn) btn.textContent = lmJsonVisible ? "Hide JSON" : "Show JSON";
      }

      function copyLabelJson() {
        if (!lmData) return;
        navigator.clipboard.writeText(JSON.stringify(lmData, null, 2))
          .then(() => toast("Copied!", "ok"))
          .catch(() => toast("Copy failed", "err"));
      }

      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderLabelResultModal(agentId, result) {
        lmData = result;
        lmJsonVisible = false;
        const modal = document.getElementById("label-result-modal");
        const title = document.getElementById("lm-title");
        const tsEl = document.getElementById("lm-ts");
        const body = document.getElementById("lm-body");
        const jsonBtn = document.getElementById("lm-json-btn");

        title.textContent = agentId.toUpperCase();
        tsEl.textContent = result.built_at_utc
          ? new Date(result.built_at_utc).toLocaleString()
          : (result.generated || "");
        if (jsonBtn) jsonBtn.textContent = "Show JSON";

        let cards = "";
        if (agentId === "bridge") cards = renderBridgeCards(result);
        else if (agentId === "vinyl") cards = renderVinylCards(result);
        else cards = renderGenericLabelCards(result);

        body.innerHTML =
          `<div class="lm-cards">${cards}</div>` +
          `<pre class="lm-json-view" id="lm-json-view">${escapeHtml(JSON.stringify(result, null, 2))}</pre>`;

        modal.style.display = "flex";
      }

      function renderBridgeCards(r) {
        let h = "";
        if (r.health) {
          const st = r.health.score >= 70 ? "good" : r.health.score >= 45 ? "monitor" : "critical";
          h += `<div class="lm-card">
      <div class="lm-card-title">Health Score</div>
      <div class="lm-score-row">
        <div class="lm-score-big">${escapeHtml(r.health.score)}<span style="font-size:1rem;color:var(--muted)">/100</span></div>
        <span class="lm-badge ${st}">${escapeHtml(r.health.status)}</span>
      </div>
      ${r.health.interpretation ? `<div class="lm-text">${escapeHtml(r.health.interpretation)}</div>` : ""}
    </div>`;
        }
        if (r.pattern_analysis) {
          const pa = r.pattern_analysis;
          h += `<div class="lm-card">
      <div class="lm-card-title">Pattern Analysis</div>
      <div class="lm-kv">
        <span class="lm-kv-key">Trend</span><span class="lm-kv-val">${escapeHtml(pa.trend || "—")}</span>
        ${pa.key_concern ? `<span class="lm-kv-key">Key Concern</span><span class="lm-kv-val">${escapeHtml(pa.key_concern)}</span>` : ""}
      </div>
      ${pa.summary ? `<div class="lm-text" style="margin-top:8px">${escapeHtml(pa.summary)}</div>` : ""}
    </div>`;
        }
        if (r.check_in_message) {
          const ci = r.check_in_message;
          h += `<div class="lm-card">
      <div class="lm-card-title">Check-in Message · ${escapeHtml(ci.channel || "")}</div>
      ${ci.subject ? `<div class="lm-kv" style="margin-bottom:8px"><span class="lm-kv-key">Subject</span><span class="lm-kv-val">${escapeHtml(ci.subject)}</span></div>` : ""}
      <div class="lm-checkin-box">${escapeHtml(ci.message || "—")}</div>
      ${ci.tone_notes ? `<div class="lm-muted" style="margin-top:8px">${escapeHtml(ci.tone_notes)}</div>` : ""}
    </div>`;
        }
        if (r.action_items && r.action_items.length) {
          h += `<div class="lm-card"><div class="lm-card-title">Action Items</div>`;
          for (const ai of r.action_items) {
            h += `<div class="lm-action-item">
        <span class="lm-action-priority">#${escapeHtml(ai.priority)}</span>
        <div>
          <div style="color:var(--text)">${escapeHtml(ai.action)}</div>
          <div class="lm-muted">${escapeHtml(ai.deadline || "")} · ${escapeHtml(ai.owner || "")}</div>
        </div>
      </div>`;
          }
          h += `</div>`;
        }
        if (r.predictions && r.predictions.length) {
          h += `<div class="lm-card"><div class="lm-card-title">Predictions</div><ul class="lm-list">`;
          for (const p of r.predictions) {
            h += `<li><strong>${escapeHtml(p.timeframe || "")}</strong> — ${escapeHtml(p.prediction || "")}${p.recommended_action ? `<br><span class="lm-muted">→ ${escapeHtml(p.recommended_action)}</span>` : ""}</li>`;
          }
          h += `</ul></div>`;
        }
        if (r.risk_assessment) {
          const ra = r.risk_assessment;
          const col = ra.churn_risk === "LOW" ? "var(--green)" : ra.churn_risk === "MEDIUM" ? "var(--yellow)" : "var(--red)";
          h += `<div class="lm-card">
      <div class="lm-card-title">Risk Assessment</div>
      <div class="lm-kv">
        <span class="lm-kv-key">Churn Risk</span>
        <span class="lm-kv-val" style="color:${col};font-weight:700">${escapeHtml(ra.churn_risk || "—")}</span>
        ${ra.churn_risk_reason ? `<span class="lm-kv-key">Reason</span><span class="lm-kv-val">${escapeHtml(ra.churn_risk_reason)}</span>` : ""}
      </div>
    </div>`;
        }
        return h;
      }

      function renderVinylCards(r) {
        let h = `<div class="lm-card">
    <div class="lm-card-title">Release Summary</div>
    <div class="lm-kv">
      <span class="lm-kv-key">Artist</span>  <span class="lm-kv-val">${escapeHtml(r.artist || "—")}</span>
      <span class="lm-kv-key">Project</span> <span class="lm-kv-val">${escapeHtml(r.project || "—")}</span>
      <span class="lm-kv-key">Type</span>    <span class="lm-kv-val">${escapeHtml(r.project_type || "—")}</span>
      <span class="lm-kv-key">Release</span> <span class="lm-kv-val">${escapeHtml(r.release_date || "—")}</span>
    </div>
  </div>`;
        if (r.blockers && r.blockers.length) {
          h += `<div class="lm-card" style="border-color:rgba(232,69,69,.3)">
      <div class="lm-card-title" style="color:var(--red)">Blockers</div>
      <ul class="lm-list">${r.blockers.map(b => `<li style="color:var(--red)">${escapeHtml(b)}</li>`).join("")}</ul>
    </div>`;
        }
        if (r.immediate_actions && r.immediate_actions.length) {
          h += `<div class="lm-card">
      <div class="lm-card-title">Immediate Actions</div>
      <ul class="lm-list">${r.immediate_actions.map(a => `<li>${escapeHtml(a)}</li>`).join("")}</ul>
    </div>`;
        }
        if (r.critical_path && r.critical_path.length) {
          h += `<div class="lm-card">
      <div class="lm-card-title">Critical Path</div>
      <ul class="lm-list">${r.critical_path.map(c => `<li>${escapeHtml(c)}</li>`).join("")}</ul>
    </div>`;
        }
        const statusMap = {
          COMPLETE: ["lm-status-done", "DONE"],
          IN_PROGRESS: ["lm-status-progress", "IN PROGRESS"],
          BLOCKED: ["lm-status-blocked", "BLOCKED"],
          PENDING: ["lm-status-pending", "PENDING"],
        };
        for (const phase of (r.phases || [])) {
          h += `<div class="lm-card">
      <div class="lm-card-title">${escapeHtml(phase.phase || "")} <span style="font-weight:400;color:var(--muted)">${escapeHtml(phase.timeline || "")}</span></div>`;
          for (const task of (phase.tasks || [])) {
            const [cls, lbl] = statusMap[task.status] || ["lm-status-pending", task.status || "PENDING"];
            const noteHtml = task.notes && !EXCLUDED_NOTE_VALUES.includes((task.notes || "").toLowerCase())
              ? `<div class="lm-muted">${escapeHtml(task.notes)}</div>` : "";
            h += `<div class="lm-task-row">
        <span class="lm-task-status ${cls}">${lbl}</span>
        <div><div style="color:var(--text)">${escapeHtml(task.task || "")}</div>${noteHtml}</div>
      </div>`;
          }
          h += `</div>`;
        }
        return h;
      }

      function renderGenericLabelCards(r) {
        let h = "";
        // Summary-like scalar string
        for (const f of ["summary", "overview", "description", "brief", "interpretation"]) {
          if (r[f] && typeof r[f] === "string") {
            h += `<div class="lm-card"><div class="lm-card-title">Summary</div><div class="lm-text">${escapeHtml(r[f])}</div></div>`;
            break;
          }
        }
        // Array fields → lists
        for (const f of ["recommendations", "signals", "insights", "opportunities", "actions", "next_actions", "key_signals", "immediate_actions", "blockers"]) {
          if (Array.isArray(r[f]) && r[f].length) {
            h += `<div class="lm-card">
        <div class="lm-card-title">${f.replace(/_/g, " ").toUpperCase()}</div>
        <ul class="lm-list">${r[f].map(item => `<li>${escapeHtml(typeof item === "string" ? item : JSON.stringify(item))}</li>`).join("")}</ul>
      </div>`;
          }
        }
        // Scalar KV
        const scalars = Object.entries(r).filter(([k, v]) => (typeof v === "string" || typeof v === "number") && !["built_at_utc", "generated"].includes(k));
        if (scalars.length) {
          h += `<div class="lm-card"><div class="lm-card-title">Details</div><div class="lm-kv">`;
          for (const [k, v] of scalars) h += `<span class="lm-kv-key">${escapeHtml(k)}</span><span class="lm-kv-val">${escapeHtml(String(v))}</span>`;
          h += `</div></div>`;
        }
        if (!h) h = `<div class="lm-card"><div class="lm-text">Result received — click Show JSON to view the full output.</div></div>`;
        return h;
      }

    // ── Mission Brief ──────────────────────────────────────────────────────
    async function fireMission() {
      const mission  = document.getElementById('mission-input').value.trim();
      const slug     = document.getElementById('mission-slug').value.trim() || STATE.slug;
      const statusEl = document.getElementById('mission-status');

      if (!mission) { toast('Enter a mission brief', 'err'); return; }
      if (!slug)    { toast('Select an artist or enter a slug', 'err'); return; }

      statusEl.innerHTML = '🚀 <span style="color:var(--cyan)">Launching CrewAI crew...</span>';

      const resp = await fetch(API_PREFIX + '/api/mission', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ artist_slug: slug, mission, release_title: mission }),
      });
      const data = await resp.json();

      if (data.job_id) {
        setTimeout(loadMissionList, 500);
        pollMissionStatus(data.job_id, statusEl);
      } else {
        statusEl.textContent = '❌ Launch failed: ' + JSON.stringify(data);
      }
    }

    function pollMissionStatus(jobId, statusEl) {
      statusEl.innerHTML = `⏳ Job: <span style="color:var(--cyan);font-family:var(--mono)">${jobId}</span> — running...`;
      const iv = setInterval(async () => {
        try {
          const r    = await fetch(API_PREFIX + '/api/mission/' + jobId);
          const data = await r.json();
          const job  = data.job || data;
          const st   = job.status;
          if (st === 'complete' || st === 'cancelled') {
            clearInterval(iv);
            if (st === 'complete') {
              statusEl.innerHTML = `✅ Mission complete — <span style="color:var(--yellow)">check Approval Queue for tasks needing sign-off</span>`;
              loadApprovalQueue();
              toast('Mission complete!', 'ok');
            } else {
              statusEl.innerHTML = `🚫 Mission cancelled`;
            }
            loadMissionList();
          } else if (st === 'error') {
            clearInterval(iv);
            statusEl.innerHTML = `❌ Error: ${escapeHtml(String(job.result || ''))}`;
            loadMissionList();
          }
        } catch (_) { /* network hiccup — keep polling */ }
      }, 3000);
    }

    // ── Recent Missions ───────────────────────────────────────────────────
    let _selectedMissionId = null;

    function _fmtTs(ts, full) {
      if (!ts || ts === '—') return '—';
      return ts.replace('T', ' ').slice(0, full ? 19 : 16);
    }

    async function loadMissionList() {
      try {
        const r    = await fetch(API_PREFIX + '/api/mission/list');
        const data = await r.json();
        renderMissionList(data.jobs || []);
      } catch (_) { /* silently ignore network errors */ }
    }

    function _missionStatusBadge(st) {
      const map = {
        running:   ['var(--cyan)',   '⏳'],
        complete:  ['var(--green)',  '✅'],
        error:     ['var(--red)',    '❌'],
        cancelled: ['var(--muted)', '🚫'],
      };
      const [color, icon] = map[st] || ['var(--muted)', '•'];
      return `<span style="font-family:var(--mono);font-size:.68rem;color:${color};
                           background:${color}1a;border:1px solid ${color}55;
                           border-radius:999px;padding:1px 8px;white-space:nowrap;">
                ${icon} ${st}</span>`;
    }

    function renderMissionList(jobs) {
      const listEl  = document.getElementById('mission-list');
      const countEl = document.getElementById('mission-list-count');
      countEl.textContent = jobs.length ? `${jobs.length} total` : '';

      if (!jobs.length) {
        listEl.innerHTML = '<div style="color:var(--muted);font-size:.8rem;padding:4px 0;">No missions yet — fire one above.</div>';
        document.getElementById('mission-detail').style.display = 'none';
        return;
      }

      listEl.innerHTML = jobs.map(j => {
        const isSelected = j.job_id === _selectedMissionId;
        const preview    = (j.mission || j.release_title || '—').slice(0, 80);
        return `
        <div id="mrow-${j.job_id}"
          onclick="selectMission('${j.job_id}')"
          style="background:${isSelected ? 'rgba(0,201,122,.06)' : 'var(--bg)'};
                 border:1px solid ${isSelected ? 'var(--green)' : 'var(--border)'};
                 border-radius:8px;padding:10px 14px;margin-bottom:6px;cursor:pointer;
                 display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
                 transition:border-color .15s;">
          <div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
              ${_missionStatusBadge(j.status)}
              <span style="font-size:.76rem;font-weight:700;color:var(--white);
                           font-family:var(--mono);">${escapeHtml(j.slug || '—')}</span>
            </div>
            <div style="font-size:.7rem;color:var(--muted);overflow:hidden;
                        text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(preview)}</div>
          </div>
          <div style="font-size:.64rem;color:var(--muted);font-family:var(--mono);white-space:nowrap;">${_fmtTs(j.created_at)}</div>
        </div>`;
      }).join('');

      // Re-render detail if a mission is selected and still in list
      if (_selectedMissionId && jobs.find(j => j.job_id === _selectedMissionId)) {
        selectMission(_selectedMissionId);
      }
    }

    async function selectMission(jobId) {
      _selectedMissionId = jobId;

      // Highlight selected row (re-render list highlight)
      document.querySelectorAll('[id^="mrow-"]').forEach(el => {
        const isThis = el.id === `mrow-${jobId}`;
        el.style.background = isThis ? 'rgba(0,201,122,.06)' : 'var(--bg)';
        el.style.border     = `1px solid ${isThis ? 'var(--green)' : 'var(--border)'}`;
      });

      const detailEl = document.getElementById('mission-detail');
      detailEl.style.display = '';
      detailEl.innerHTML = '<div style="color:var(--muted);font-size:.8rem;">Loading...</div>';

      try {
        const r    = await fetch(API_PREFIX + '/api/mission/' + jobId);
        const data = await r.json();
        if (!data.ok) {
          detailEl.innerHTML = `<div style="color:var(--red);font-size:.8rem;">⚠ ${escapeHtml(data.error || 'Not found')}</div>`;
          return;
        }
        renderMissionDetail(data.job);
      } catch (err) {
        detailEl.innerHTML = `<div style="color:var(--red);font-size:.8rem;">⚠ ${escapeHtml(err.message)}</div>`;
      }
    }

    function renderMissionDetail(job) {
      const detailEl = document.getElementById('mission-detail');
      const isRunning = job.status === 'running';

      const rows = [
        ['Job ID',         job.job_id || '—'],
        ['Slug',           job.slug || '—'],
        ['Status',         job.status || '—'],
        ['Created',        _fmtTs(job.created_at, true)],
        ['Updated',        _fmtTs(job.updated_at, true)],
        ['Finished',       _fmtTs(job.finished_at, true)],
        ['Mission',        (job.mission || '—').slice(0, 200)],
        ['Release Title',  (job.release_title || '—').slice(0, 120)],
      ].map(([k, v]) => `
        <span style="font-size:.7rem;color:var(--muted);font-family:var(--mono);">${escapeHtml(k)}</span>
        <span style="font-size:.72rem;color:var(--white);word-break:break-word;">${escapeHtml(String(v))}</span>
      `).join('');

      const resultHtml = job.result
        ? `<div style="margin-top:10px;">
             <div style="font-size:.65rem;color:var(--muted);font-family:var(--mono);margin-bottom:4px;">RESULT</div>
             <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;
                         padding:10px;font-size:.72rem;color:var(--white);font-family:var(--mono);
                         white-space:pre-wrap;max-height:120px;overflow:auto;">${escapeHtml(String(job.result).slice(0, 600))}${String(job.result).length > 600 ? '…' : ''}</div>
           </div>`
        : '';

      detailEl.innerHTML = `
        <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin-bottom:10px;">${rows}</div>
        ${resultHtml}
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
          ${isRunning ? `<button onclick="cancelMission('${job.job_id}')"
            style="background:rgba(232,69,69,.08);border:1px solid var(--red);border-radius:6px;
                   color:var(--red);padding:6px 16px;font-size:.74rem;font-weight:700;cursor:pointer;">
            🚫 Cancel Mission
          </button>` : ''}
          <button onclick="clearMission('${job.job_id}')"
            style="background:rgba(100,100,100,.08);border:1px solid var(--border);border-radius:6px;
                   color:var(--muted);padding:6px 16px;font-size:.74rem;font-weight:700;cursor:pointer;">
            🗑 Clear
          </button>
        </div>`;
    }

    async function cancelMission(jobId) {
      const r    = await fetch(API_PREFIX + '/api/mission/' + jobId + '/cancel', { method: 'POST' });
      const data = await r.json();
      if (data.ok) {
        toast('Mission cancelled', 'inf');
        loadMissionList();
        renderMissionDetail(data.job);
      } else {
        toast(data.error || 'Cancel failed', 'err');
      }
    }

    async function clearMission(jobId) {
      const r    = await fetch(API_PREFIX + '/api/mission/' + jobId, { method: 'DELETE' });
      const data = await r.json();
      if (data.ok) {
        toast('Mission cleared', 'inf');
        if (_selectedMissionId === jobId) {
          _selectedMissionId = null;
          document.getElementById('mission-detail').style.display = 'none';
        }
        loadMissionList();
      } else {
        toast(data.error || 'Clear failed', 'err');
      }
    }

    // ── Approval Queue ─────────────────────────────────────────────────────
    async function loadApprovalQueue() {
      const r       = await fetch(API_PREFIX + '/api/ceo/queue');
      const tasks   = await r.json();
      const el      = document.getElementById('approval-queue');
      const countEl = document.getElementById('queue-count');

      countEl.textContent = tasks.length ? `${tasks.length} pending` : '';

      if (!tasks.length) {
        el.innerHTML = '<div style="color:var(--muted);font-size:.8rem;padding:4px 0;">✅ No pending approvals</div>';
        return;
      }

      const actionIcons = {
        send_mass_email: '📧', publish_public_content: '📝',
        post_social_media: '📱', press_outreach: '📰',
        mint_nft: '🔷', spend_money: '💰',
        bulk_crm_update: '👥', orchard_submission: '🎵',
        spotify_playlist_pitch: '🎧',
      };

      el.innerHTML = tasks.map(t => `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;
                    padding:12px 14px;margin-bottom:8px;
                    display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:start;">
          <div>
            <div style="font-size:.76rem;font-weight:700;color:var(--white);margin-bottom:3px;">
              ${actionIcons[t.action] || '⚡'} [${t.agent}] ${t.action.replaceAll('_',' ').toUpperCase()}
            </div>
            <div style="font-size:.7rem;color:var(--muted);font-family:var(--mono);
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;">
              ${JSON.stringify(t.payload).slice(0, 140)}${JSON.stringify(t.payload).length > 140 ? '…' : ''}
            </div>
            <div style="font-size:.64rem;color:#444;margin-top:4px;">${t.queued_at}</div>
          </div>
          <button onclick="actionApproval('${t.task_id}', true)"
            style="background:rgba(0,201,122,.08);border:1px solid var(--green);
                   border-radius:6px;color:var(--green);padding:7px 16px;
                   font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;">
            ✓ Approve
          </button>
          <button onclick="actionApproval('${t.task_id}', false)"
            style="background:rgba(232,69,69,.08);border:1px solid var(--red);
                   border-radius:6px;color:var(--red);padding:7px 16px;
                   font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;">
            ✗ Reject
          </button>
        </div>`).join('');
    }

    async function actionApproval(taskId, approved) {
      await fetch(API_PREFIX + '/api/ceo/approve/' + taskId, {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ approved, note: '' }),
      });
      toast(approved ? '✅ Approved — executing via n8n' : '✗ Rejected', approved ? 'ok' : 'err');
      setTimeout(loadApprovalQueue, 500);
    }

    async function loadSageBrief() {
      const container = document.getElementById('sage-brief-container');
      try {
        const resp = await fetch('/label/sage/api/brief');
        const data = await resp.json();
        if (data.error) return;

        document.getElementById('sage-date').textContent = data.date;
        document.getElementById('sage-headline').textContent = data.headline;
        
        const actionsHtml = data.priority_actions.map(a => `
          <div style="background: var(--surface2); padding: 12px; border-radius: 6px; border-left: 3px solid ${a.urgency === 'high' ? 'var(--red)' : (a.urgency === 'medium' ? 'var(--yellow)' : 'var(--green)')}">
            <div style="font-size: 0.65rem; text-transform: uppercase; color: var(--muted); margin-bottom: 4px;">Priority ${a.rank}</div>
            <div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 4px;">${a.action}</div>
            <div style="font-size: 0.75rem; color: var(--label);">${a.context}</div>
          </div>
        `).join('');
        
        document.getElementById('sage-actions').innerHTML = actionsHtml;
        container.style.display = 'block';
      } catch (err) {
        console.error('SAGE Brief Error:', err);
      }
    }

    // Auto-load and auto-refresh approval queue and mission list
    document.addEventListener('DOMContentLoaded', () => {
      loadApprovalQueue();
      setInterval(loadApprovalQueue, 30000);
      loadMissionList();
      setInterval(loadMissionList, 15000);
    });
  </script>
</body>

</html>
