<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LABEL — Dashboard</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --cyan: #00c8d4;
      --cyan-dim: #007a82;
      --green: #00c97a;
      --yellow: #f5c842;
      --red: #e84545;
      --white: #f0f0f0;
      --muted: #555;
      --text: #d8d8d8;
      --label: #888;
      --mono: "Courier New", Courier, monospace;
      --sans: "Segoe UI", system-ui, sans-serif;
      --sidebar: 240px;
      --topbar: 56px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-family: var(--sans);
    }

    /* Add consistent styling for the back button */
    .back {
      color: #555;
      text-decoration: none;
      font-size: .82rem;
      margin-bottom: 20px;
      display: inline-block;
    }

    .back:hover {
      color: #ff6b6b;
      /* Optional: Customize hover color */
    }

    /* ── App shell ──────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════════════════════════════ */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .sb-logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sb-logo-mark {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--cyan);
    }

    .sb-logo-mark span {
      color: var(--white);
    }

    .sb-logo-sub {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .sb-nav {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--label);
      font-size: 0.82rem;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-btn.active {
      background: rgba(0, 200, 212, 0.1);
      color: var(--cyan);
    }

    .sb-roster-label {
      padding: 12px 16px 6px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .sb-artists {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .sb-artists::-webkit-scrollbar {
      width: 4px;
    }

    .sb-artists::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .artist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--label);
      font-size: 0.82rem;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .artist-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .artist-item.active {
      background: rgba(0, 200, 212, 0.08);
      color: var(--cyan);
      border-left: 2px solid var(--cyan);
      padding-left: 10px;
    }

    .sb-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--cyan-dim);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .artist-item.active .sb-avatar {
      background: var(--cyan);
      color: var(--bg);
    }

    .sb-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
    }

    .sb-dot.good {
      background: var(--green);
    }

    .sb-dot.monitor {
      background: var(--yellow);
    }

    .sb-dot.critical {
      background: var(--red);
      box-shadow: 0 0 4px var(--red);
    }

    .sb-footer {
      padding: 10px 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      transition: background 0.15s, color 0.15s;
    }

    .logout-btn:hover {
      background: rgba(232, 69, 69, 0.08);
      color: var(--red);
    }

    /* ══════════════════════════════════════════════════════════════════
       MAIN
    ══════════════════════════════════════════════════════════════════ */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: var(--topbar);
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 5;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: 0.06em;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn-sm:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }

    .btn-sm.cyan {
      background: rgba(0, 200, 212, 0.1);
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }

    /* Hamburger (mobile only) */
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      padding: 4px 8px;
    }

    /* Scrollable content */
    #content {
      flex: 1;
      overflow-y: auto;
    }

    #content::-webkit-scrollbar {
      width: 6px;
    }

    #content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ══════════════════════════════════════════════════════════════════
       VIEWS
    ══════════════════════════════════════════════════════════════════ */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── Dashboard ── */
    #view-dashboard {
      padding: 24px;
    }

    .dash-heading {
      margin-bottom: 20px;
    }

    .dash-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--white);
    }

    .dash-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
    }

    .stat-val.red {
      color: var(--red);
    }

    .stat-val.yellow {
      color: var(--yellow);
    }

    .stat-val.green {
      color: var(--green);
    }

    .stat-val.cyan {
      color: var(--cyan);
    }

    .stat-lbl {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 8px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
    }

    /* Artist card */
    .artist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    }

    .artist-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .artist-card.status-critical {
      border-left-color: var(--red);
    }

    .artist-card.status-monitor {
      border-left-color: var(--yellow);
    }

    .artist-card.status-good {
      border-left-color: var(--green);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-av {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
    }

    .status-critical .card-av {
      border-color: var(--red);
      color: var(--red);
    }

    .status-monitor .card-av {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .status-good .card-av {
      border-color: var(--green);
      color: var(--green);
    }

    .card-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .card-badge.critical {
      background: rgba(232, 69, 69, 0.1);
      color: var(--red);
      border: 1px solid rgba(232, 69, 69, 0.3);
    }

    .card-badge.monitor {
      background: rgba(245, 200, 66, 0.1);
      color: var(--yellow);
      border: 1px solid rgba(245, 200, 66, 0.3);
    }

    .card-badge.good {
      background: rgba(0, 201, 122, 0.1);
      color: var(--green);
      border: 1px solid rgba(0, 201, 122, 0.3);
    }

    .card-badge.no-data {
      background: rgba(85, 85, 85, 0.1);
      color: var(--muted);
      border: 1px solid rgba(85, 85, 85, 0.3);
    }

    .card-name {
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 2px;
    }

    .card-genre {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-score-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 12px;
    }

    .score-big {
      font-family: var(--mono);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-big.critical {
      color: var(--red);
    }

    .score-big.monitor {
      color: var(--yellow);
    }

    .score-big.good {
      color: var(--green);
    }

    .score-big.no-data {
      color: var(--muted);
    }

    .score-denom {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .trend-pill {
      margin-left: auto;
      font-size: 1.1rem;
    }

    .card-foot {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Artist view ── */
    .artist-hdr {
      padding: 22px 24px 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 0;
      margin-bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }

    .back-btn:hover {
      color: var(--cyan);
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
    }

    .hero-av {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .hero-info {
      flex: 1;
    }

    .hero-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .hero-meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .hero-score-blk {
      text-align: right;
      flex-shrink: 0;
    }

    .hero-score {
      font-family: var(--mono);
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .hero-score.critical {
      color: var(--red);
    }

    .hero-score.monitor {
      color: var(--yellow);
    }

    .hero-score.good {
      color: var(--green);
    }

    .hero-score.no-data {
      color: var(--muted);
    }

    .hero-score-lbl {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Tabs */
    .tabs-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      overflow-x: auto;
    }

    .tabs-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      padding: 12px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    .tab-panel {
      display: none;
      padding: 22px 24px;
    }

    .tab-panel.active {
      display: block;
    }

    /* Utility layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .block-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(42, 42, 42, 0.6);
      font-size: 0.8rem;
      gap: 10px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-key {
      color: var(--muted);
      flex-shrink: 0;
    }

    .info-val {
      color: var(--text);
      font-weight: 500;
      text-align: right;
    }

    /* ── Agent buttons ── */
    .pipeline-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(0, 200, 212, 0.12), rgba(0, 122, 130, 0.1));
      border: 1px solid var(--cyan-dim);
      border-radius: 8px;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.15s;
      margin-bottom: 12px;
    }

    .pipeline-btn:hover {
      background: linear-gradient(135deg, rgba(0, 200, 212, 0.22), rgba(0, 122, 130, 0.18));
      box-shadow: 0 0 20px rgba(0, 200, 212, 0.15);
    }

    .pipeline-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .agent-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 14px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--label);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    .agent-btn:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
      background: rgba(0, 200, 212, 0.05);
    }

    .agent-btn.running {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0, 200, 212, 0.08);
      animation: border-pulse 1s ease-in-out infinite;
    }

    @keyframes border-pulse {

      0%,
      100% {
        border-color: var(--cyan);
      }

      50% {
        border-color: var(--cyan-dim);
      }
    }

    .agent-btn.done-ok {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 201, 122, 0.05);
    }

    .agent-btn.done-err {
      border-color: var(--red);
      color: var(--red);
      background: rgba(232, 69, 69, 0.05);
    }

    .agent-icon {
      width: 32px;
      height: 32px;
      display: block;
      color: var(--cyan);
    }

    .agent-icon svg {
      width: 100%;
      height: 100%;
    }

    .agent-lbl {
      font-weight: 700;
    }

    .agent-desc {
      font-size: 0.62rem;
      color: var(--muted);
    }

    /* ── Terminal ── */
    .terminal-wrap {
      background: #090909;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .t-dots {
      display: flex;
      gap: 6px;
    }

    .t-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .t-dot.r {
      background: #e84545;
    }

    .t-dot.y {
      background: #f5c842;
    }

    .t-dot.g {
      background: #00c97a;
    }

    .t-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .t-actions {
      display: flex;
      gap: 6px;
    }

    .t-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.65rem;
      padding: 2px 8px;
      font-family: var(--mono);
      transition: all 0.15s;
    }

    .t-btn:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }

    .terminal-out {
      font-family: var(--mono);
      font-size: 0.76rem;
      line-height: 1.65;
      color: #9ab;
      padding: 14px 16px;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .terminal-out::-webkit-scrollbar {
      width: 4px;
    }

    .terminal-out::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .t-cyan {
      color: var(--cyan);
    }

    .t-green {
      color: var(--green);
    }

    .t-red {
      color: var(--red);
    }

    .t-dim {
      color: var(--muted);
    }

    .t-cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--cyan);
      border-radius: 1px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .chart-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .chart-box {
      position: relative;
      height: 240px;
    }

    /* ── Outputs accordion ── */
    .accordion {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .acc-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.84rem;
      text-align: left;
      transition: background 0.15s;
    }

    .acc-toggle:hover {
      background: var(--surface2);
    }

    .acc-toggle.open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: transparent;
    }

    .acc-tag {
      font-family: var(--mono);
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--cyan);
      background: rgba(0, 200, 212, 0.08);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .acc-chevron {
      color: var(--muted);
      transition: transform 0.2s;
      font-size: 0.75rem;
    }

    .acc-toggle.open .acc-chevron {
      transform: rotate(180deg);
    }

    .acc-body {
      display: none;
      background: #090909;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 0.73rem;
      color: #9ab;
      line-height: 1.6;
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .acc-body.open {
      display: block;
    }

    /* ── Check-in tab ── */
    .checkin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.8rem;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--cyan-dim);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-primary {
      flex: 1;
      padding: 11px;
      background: linear-gradient(135deg, var(--cyan-dim), #005f65);
      border: 1px solid var(--cyan-dim);
      border-radius: 8px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn-primary:hover {
      opacity: 0.88;
      box-shadow: 0 0 20px rgba(0, 200, 212, 0.18);
    }

    .btn-secondary {
      flex: 1;
      padding: 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }

    .webhook-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.7;
      max-height: 180px;
      overflow-y: auto;
    }

    .result-box {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: var(--mono);
      white-space: pre-wrap;
      display: none;
    }

    .result-box.ok {
      background: rgba(0, 201, 122, 0.08);
      border: 1px solid rgba(0, 201, 122, 0.25);
      color: var(--green);
    }

    .result-box.err {
      background: rgba(232, 69, 69, 0.08);
      border: 1px solid rgba(232, 69, 69, 0.25);
      color: var(--red);
    }

    /* ── Shared utils ── */
    .no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.82rem;
      gap: 10px;
      text-align: center;
    }

    .no-data-icon {
      font-size: 2rem;
      opacity: 0.3;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.2s ease;
      max-width: 320px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(40px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .toast.ok {
      background: #1a3d2e;
      border: 1px solid var(--green);
      color: var(--green);
    }

    .toast.err {
      background: #3d1a1a;
      border: 1px solid var(--red);
      color: var(--red);
    }

    .toast.inf {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* History table */
    .hist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin-top: 14px;
    }

    .hist-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }

    .hist-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(42, 42, 42, 0.5);
      color: var(--text);
    }

    .hist-table tr:last-child td {
      border-bottom: none;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: 1fr;
      }

      #sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        bottom: 0;
        width: var(--sidebar);
        z-index: 100;
        transition: left 0.25s;
      }

      #sidebar.open {
        left: 0;
      }

      .hamburger {
        display: block;
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .agent-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .two-col,
      .checkin-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Label result modal ── */
    .lm-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .78);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .lm-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lm-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .lm-modal-dept {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .lm-modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
    }

    .lm-modal-ts {
      font-size: .68rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    .lm-modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color .15s;
      cursor: pointer;
    }

    .lm-modal-close:hover {
      color: var(--white);
    }

    .lm-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lm-modal-foot {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .lm-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .lm-card-title {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .lm-score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .lm-score-big {
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--cyan);
      line-height: 1;
    }

    .lm-badge {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .lm-badge.good {
      background: rgba(0, 201, 122, .1);
      color: var(--green);
      border: 1px solid rgba(0, 201, 122, .2);
    }

    .lm-badge.monitor {
      background: rgba(245, 200, 66, .1);
      color: var(--yellow);
      border: 1px solid rgba(245, 200, 66, .2);
    }

    .lm-badge.critical {
      background: rgba(232, 69, 69, .1);
      color: var(--red);
      border: 1px solid rgba(232, 69, 69, .2);
    }

    .lm-text {
      font-size: .82rem;
      color: var(--text);
      line-height: 1.6;
    }

    .lm-muted {
      font-size: .78rem;
      color: var(--muted);
    }

    .lm-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lm-list li {
      font-size: .82rem;
      color: var(--text);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }

    .lm-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--cyan-dim);
    }

    .lm-action-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid rgba(42, 42, 42, .6);
      font-size: .82rem;
    }

    .lm-action-item:last-child {
      border-bottom: none;
    }

    .lm-action-priority {
      background: rgba(0, 200, 212, .12);
      border: 1px solid rgba(0, 200, 212, .2);
      border-radius: 4px;
      color: var(--cyan);
      font-size: .62rem;
      font-weight: 700;
      font-family: var(--mono);
      padding: 2px 6px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .lm-kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 6px 12px;
      font-size: .8rem;
    }

    .lm-kv-key {
      color: var(--muted);
    }

    .lm-kv-val {
      color: var(--text);
    }

    .lm-checkin-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: .82rem;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
    }

    .lm-phase-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--label);
      margin: 10px 0 6px;
    }

    .lm-task-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 5px 0;
      border-bottom: 1px solid rgba(42, 42, 42, .4);
      font-size: .78rem;
    }

    .lm-task-row:last-child {
      border-bottom: none;
    }

    .lm-task-status {
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .lm-status-pending {
      background: rgba(85, 85, 85, .2);
      color: var(--muted);
    }

    .lm-status-done {
      background: rgba(0, 201, 122, .12);
      color: var(--green);
    }

    .lm-status-progress {
      background: rgba(0, 200, 212, .12);
      color: var(--cyan);
    }

    .lm-status-blocked {
      background: rgba(232, 69, 69, .12);
      color: var(--red);
    }

    .lm-json-view {
      display: none;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--cyan);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    @media (max-width: 600px) {
      .lm-modal {
        max-height: 95vh;
        border-radius: 8px;
      }

      .lm-kv {
        grid-template-columns: 100px 1fr;
      }
    }
