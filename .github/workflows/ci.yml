# Maestro-AI CI Pipeline for GitHub Actions
# This workflow runs tests and checks artifact freshness on every push and PR.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run baseline verification
        run: |
          python test_agents.py

      - name: Check artifact freshness
        run: |
          git diff --exit-code feature_list.json || (echo "feature_list.json was not updated!" && exit 1)
          git diff --exit-code claude-progress.md || (echo "claude-progress.md was not updated!" && exit 1)
